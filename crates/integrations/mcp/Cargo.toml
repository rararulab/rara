[package]
name = "rara-mcp"
version = "0.0.1"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = []
k8s = ["rara-k8s"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
base.workspace = true
bon.workspace = true
futures.workspace = true
jiff.workspace = true
oauth2.workspace = true
rara-kernel.workspace = true
rara-keyring-store.workspace = true
rara-paths.workspace = true
reqwest.workspace = true
rmcp = { version = "^0.16", default-features = false, features = [
    "auth",
    "base64",
    "client",
    "macros",
    "schemars",
    "server",
    "transport-child-process",
    "transport-streamable-http-client-reqwest",
    "transport-streamable-http-server",
] }
schemars.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2.workspace = true
smart-default.workspace = true
snafu.workspace = true
tokio.workspace = true
tokio-util.workspace = true
tracing.workspace = true

# K8s Pod transport (optional, behind "k8s" feature)
rara-k8s = { workspace = true, optional = true }

[dev-dependencies]
axum.workspace = true
tempfile.workspace = true

[lints]
workspace = true
