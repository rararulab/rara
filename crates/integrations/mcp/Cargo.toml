[package]
name = "rara-mcp"
version = "0.0.1"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = []
k8s = ["kube", "k8s-openapi", "uuid"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
base.workspace = true
bon.workspace = true
futures.workspace = true
jiff.workspace = true
keyring = { version = "^3.6", features = ["crypto-rust"] }
oauth2.workspace = true
rara-keyring-store.workspace = true
rara-paths.workspace = true
reqwest.workspace = true
rmcp = { version = "^0.16", default-features = false, features = [
    "auth",
    "base64",
    "client",
    "macros",
    "schemars",
    "server",
    "transport-child-process",
    "transport-streamable-http-client-reqwest",
    "transport-streamable-http-server",
] }
schemars.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2.workspace = true
smart-default.workspace = true
snafu.workspace = true
tokio.workspace = true
tokio-util.workspace = true
tool-core.workspace = true
tracing.workspace = true

# K8s Pod transport (optional, behind "k8s" feature)
kube = { version = "3.0", features = ["runtime", "client"], optional = true }
k8s-openapi = { version = "0.27", features = ["v1_31"], optional = true }
uuid = { version = "1", features = ["v4"], optional = true }

[dev-dependencies]
axum.workspace = true
tempfile.workspace = true

[lints]
workspace = true
