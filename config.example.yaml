# Example rara configuration.
#
# Copy to `~/.config/rara/config.yaml` (see `rara_paths::config_file()`) or
# to `./config.yaml` next to the binary. All required keys must be present;
# rara will fail to boot with an explicit error if a required field is
# missing. There are NO hardcoded defaults in Rust code — this file is the
# single source of truth for every tunable.

# ---------------------------------------------------------------------------
# HTTP + gRPC servers (required)
# ---------------------------------------------------------------------------

http:
  bind_address: "127.0.0.1:25555"
  # Browser origins permitted to call `/api/v1/*`. At least one entry is
  # required — the server refuses to boot with an empty list. Add every host
  # the Vite dev server is reachable from (localhost plus any LAN IPs used to
  # open the UI from other devices).
  cors_allowed_origins:
    - "http://localhost:5173"
    - "http://10.0.0.183:5173"

grpc:
  bind_address: "127.0.0.1:50051"
  server_address: "127.0.0.1:50051"

# ---------------------------------------------------------------------------
# Owner authentication (required)
# ---------------------------------------------------------------------------
#
# `owner_token` is the static bearer token that authenticates admin HTTP
# requests (Authorization: Bearer <token>) and the web WebSocket upgrade
# (?token=...). Treat it like a password: long, random, kept out of logs
# and version control.
#
# `owner_user_id` must reference a `users[].name` below whose role is
# `root` or `admin`. The backend admin middleware resolves every
# authenticated request to this principal.
#
# The web channel (frontend + WebSocket) authenticates via `owner_token`
# and, after auth, uses `owner_user_id` directly as the kernel identity,
# so an implicit `(web, owner_user_id) -> owner_user_id` mapping is
# registered automatically. You do NOT need a redundant `type: web`
# entry under `users[].platforms` for the owner. An explicit entry is
# still accepted (useful for multi-user deployments where each user has
# a distinct web handle).

owner_token: "change-me-to-a-long-random-string"
owner_user_id: "you"

# ---------------------------------------------------------------------------
# Configured users — platform identity mappings (required, non-empty)
# ---------------------------------------------------------------------------

users:
  - name: "you"
    role: root
    platforms:
      - type: telegram
        user_id: "1234567890"

# ---------------------------------------------------------------------------
# Mita proactive agent (required)
# ---------------------------------------------------------------------------

mita:
  heartbeat_interval: "30m"

# ---------------------------------------------------------------------------
# LLM provider registry — seeded to the settings store at startup
# ---------------------------------------------------------------------------

llm:
  default_provider: "openrouter"
  providers:
    openrouter:
      base_url: "https://openrouter.ai/api/v1"
      api_key: "sk-or-..."
      default_model: "anthropic/claude-3.5-sonnet"
    openai:
      base_url: "https://api.openai.com/v1"
      api_key: "sk-..."
      default_model: "gpt-4o-mini"
    minimax:
      base_url: "https://api.minimax.io/v1"
      api_key: "mm-..."
      default_model: "MiniMax-M2.7"

# ---------------------------------------------------------------------------
# Knowledge layer — long-term memory extraction
# ---------------------------------------------------------------------------
#
# The extractor's LLM binding lives in the `agents:` block below
# (`knowledge_extractor`), NOT here. Any legacy `extractor_model` key is
# silently ignored (#1638).

knowledge:
  embedding_model: "text-embedding-3-small"
  embedding_dimensions: 1536
  search_top_k: 10
  similarity_threshold: 0.85

# ---------------------------------------------------------------------------
# Per-agent `{driver, model}` bindings (unified registry — #1635/#1636/#1637,
# relaxed in #1670)
# ---------------------------------------------------------------------------
#
# The entire `agents:` section is OPTIONAL. Resolution order per agent:
#   1. settings DB override (runtime mutation via `agents.<name>.{driver,model}`)
#   2. YAML `agents.<name>.{driver, model}` (this block)
#   3. `llm.default_provider` + that provider's `default_model` (fallback)
#
# Omit the block entirely and every background agent — `knowledge_extractor`,
# `title_gen`, etc. — inherits the default provider's default model, just like
# the main user-facing agent. Add an entry here only when you want to pin a
# specific agent to a different provider or model.
#
# Optional `max_output_chars` caps a headless agent's free-form output
# without a rebuild (currently consumed by `title_gen`).

agents:
  rara:
    driver: minimax
    model: MiniMax-M2.7
  knowledge_extractor:
    driver: openai
    model: gpt-4o-mini
  title_gen:
    driver: openai
    model: gpt-4o-mini
    max_output_chars: 50

# ---------------------------------------------------------------------------
# Sandboxed code execution (`run_code` tool — optional)
# ---------------------------------------------------------------------------
#
# When this block is present the `run_code` tool can spin up a per-session
# boxlite microVM using the configured rootfs image. Omit the block to
# disable code execution: the tool stays registered but every call returns
# a clear "sandbox not configured" error so the LLM can react.
#
# Pre-flight: `rara setup boxlite` must have staged the runtime files (see
# docs/guides/boxlite-runtime.md).

# sandbox:
#   default_rootfs_image: "alpine:latest"

# ---------------------------------------------------------------------------
# Telemetry — optional OTLP traces and Pyroscope continuous profiling
# ---------------------------------------------------------------------------
#
# Two independent OTLP paths are supported:
#
# 1. `telemetry.otlp_endpoint` / `otlp_protocol` — the legacy generic OTLP
#    sink (Alloy / Tempo). Set `otlp_endpoint` to a non-empty URL to enable.
#
# 2. `telemetry.otlp` — the self-hosted Langfuse traces exporter (HTTP only).
#    Disabled by default; set `enabled: true` and provide a `traces_endpoint`
#    plus auth header to push spans to a running Langfuse instance.
#
# `pyroscope` enables continuous CPU profiling via the Grafana Pyroscope agent
# (pprof-rs backend). Omit the whole `pyroscope:` section to disable — that is
# the zero-overhead default. When present, every field is required.
#
# Tags attached to profiles are process-level only (env, host, build_commit).
# Per-request labels (session_id, skill_name, user_id, …) MUST NOT be added —
# they explode label cardinality on the Pyroscope server.
#
# Limitation: pprof-rs samples OS-thread CPU only. It does NOT capture async
# `.await` stalls or tokio mutex contention; use tokio-console for those
# (separate feature flag, future chore).
#
# Example (commented out — opt in by uncommenting):
#
# telemetry:
#   otlp_endpoint: "http://alloy:4318/v1/traces"
#   otlp_protocol: "http"
#   env: "prod"
#   otlp:
#     enabled: false
#     traces_endpoint: "http://10.0.0.183:3000/api/public/otel/v1/traces"
#     deployment_environment: "dev"
#     headers:
#       authorization: "Basic <base64(public_key:secret_key)>"
#   pyroscope:
#     enabled: false  # default off — flip to true to ship profiles
#     endpoint: "http://10.0.0.183:4040"
#     application_name: "rara"
#     sample_rate: 100  # Hz

# ---------------------------------------------------------------------------
# Optional integrations — remove or leave commented out if unused
# ---------------------------------------------------------------------------

# telegram:
#   bot_token: "123456:ABC..."
