# Rara Configuration
# Copy this file to ~/.config/job/config.yaml and adjust values.

database:
  database_url: "postgres://postgres:postgres@localhost:5432/rara"
  migration_dir: "crates/rara-model/migrations"
  # max_connections: 20

http:
  bind_address: "127.0.0.1:25555"
  # max_body_size: "10MB"
  # enable_cors: true
  # request_timeout: 60

grpc:
  bind_address: "127.0.0.1:50051"
  server_address: "127.0.0.1:50051"
  # max_recv_message_size: "4MB"
  # max_send_message_size: "4MB"

object_store:
  endpoint: "http://localhost:9000"
  bucket: "rara"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  region: "us-east-1"

main_service_http_base: "http://127.0.0.1:25555"

memory:
  mem0_base_url: "http://localhost:8080"
  memos_base_url: "http://localhost:5230"
  memos_token: ""
  hindsight_base_url: "http://localhost:8888"
  hindsight_bank_id: "default"

langfuse:
  host: "http://localhost:3000"
  # public_key: ""
  # secret_key: ""

telemetry: {}
  # otlp_endpoint: ""
  # otlp_protocol: ""

# jwt_secret: ""
