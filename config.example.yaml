# Rara configuration example
# Copy to config.yaml and fill in your values.
# See docs/src/configuration.md for full reference.

database:
  max_connections: 5

http:
  bind_address: 127.0.0.1:25555
  max_body_size: 100MiB
  enable_cors: true
  request_timeout: 60

grpc:
  bind_address: 127.0.0.1:50051
  server_address: 127.0.0.1:50051
  max_recv_message_size: 512MiB
  max_send_message_size: 512MiB

telemetry:
  otlp_endpoint: null
  otlp_protocol: null

llm:
  default_provider: openrouter
  providers:
    openrouter:
      base_url: https://openrouter.ai/api/v1
      api_key: sk-or-v1-YOUR_KEY_HERE
      default_model: anthropic/claude-sonnet-4

telegram:
  bot_token: YOUR_BOT_TOKEN
  chat_id: 'YOUR_CHAT_ID'
  notification_channel_id: 'YOUR_CHANNEL_ID'

users:
- name: your_name
  role: root
  platforms:
  - type: telegram
    user_id: 'YOUR_TELEGRAM_USER_ID'

max_ingress_per_minute: 30

mita:
  heartbeat_interval: 30m

knowledge:
  embedding_model: text-embedding-3-small
  embedding_dimensions: 1536
  search_top_k: 10
  similarity_threshold: 0.85
  extractor_model: gpt-4o-mini

# Speech-to-Text — requires a running whisper-server (whisper.cpp).
# Mac: brew install whisper-cpp && whisper-server -m ggml-base.bin
# Linux GPU: compile whisper.cpp with CUDA, run whisper-server
# stt:
#   base_url: http://localhost:8080
#   model: whisper-1
#   language: zh   # optional, auto-detect if omitted

context_folding:
  enabled: true
  fold_threshold: 0.6
  min_entries_between_folds: 15
  fold_model: null
