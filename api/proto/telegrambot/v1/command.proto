syntax = "proto3";

package job.telegrambot.v1;

option go_package = "github.com/crrow/job/pb/telegrambot/v1;telegrambotpb";
option java_outer_classname = "TelegramBotCommandProto";
option java_package = "com.job.api.telegrambot.v1";

message SendMessageRequest {
  int64 chat_id = 1;
  string text = 2;
}

message SendMessageResponse {
  bool accepted = 1;
}

message DispatchCommandRequest {
  string command = 1;
  string payload_json = 2;
}

message DispatchCommandResponse {
  bool accepted = 1;
  string message = 2;
}

service TelegramBotCommandService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc DispatchCommand(DispatchCommandRequest) returns (DispatchCommandResponse);
}
