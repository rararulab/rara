version: v2
managed:
  enabled: true
  disable:
    - file_option: java_package
    - file_option: java_outer_classname
    - file_option: java_multiple_files
    - file_option: csharp_namespace
plugins:
  # Rust stubs are generated by `api/build.rs` via tonic/prost during cargo builds.
  # Buf generation here is only for Python worker/client stubs.
  - remote: buf.build/protocolbuffers/python:v32.0
    out: ../api-generated/python/pb
  - remote: buf.build/grpc/python:v1.68.0
    out: ../api-generated/python/pb
inputs:
  - directory: proto
    paths:
      - proto/execution/v1/worker.proto
