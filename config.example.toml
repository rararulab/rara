# Job Application Platform Configuration
#
# Copy this file to `config.toml` and adjust values for your environment.
#
# Configuration priority (highest first):
#   1. Legacy environment variables (DATABASE_URL, OPENROUTER_API_KEY, etc.)
#   2. JOB__-prefixed environment variables (JOB__DATABASE__DATABASE_URL, etc.)
#   3. config.toml (this file)
#   4. Code defaults

[database]
database_url = "postgres://postgres:postgres@localhost:5432/job"
max_connections = 10
min_connections = 1
connect_timeout_secs = 30
max_lifetime_secs = 1800    # 30 minutes
idle_timeout_secs = 600     # 10 minutes

[http]
bind_address = "127.0.0.1:3000"
# max_body_size: accepts human-readable sizes like "100MiB" or raw bytes
max_body_size = "100MiB"
enable_cors = true
request_timeout = 60

[grpc]
bind_address = "127.0.0.1:50051"
server_address = "127.0.0.1:50051"
max_recv_message_size = "512MiB"
max_send_message_size = "512MiB"

[openrouter]
api_key = "your-openrouter-api-key"
model = "openai/gpt-4o"

[minio]
endpoint = "http://localhost:9000"
bucket = "job-markdown"
access_key = "minioadmin"
secret_key = "minioadmin"
region = "us-east-1"

[crawl4ai]
url = "http://localhost:11235"

# Saved-job GC interval in hours
gc_interval_hours = 24

# Graceful shutdown on SIGTERM/Ctrl+C
enable_graceful_shutdown = true

# Telegram bot configuration (for `job bot` or `job combined`)
[telegram]
bot_token = "your-telegram-bot-token"
chat_id = 0

# Main service HTTP base URL (for telegram bot -> main service calls)
main_service_http_base = "http://127.0.0.1:3000"
