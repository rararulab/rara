{{- if and .Values.chromadb.enabled .Values.chromadb.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rara-infra.fullname" . }}-chromadb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rara-infra.componentLabels" (dict "root" . "component" "chromadb") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.chromadb.persistence.storageClass }}
  storageClassName: {{ .Values.chromadb.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.chromadb.persistence.size }}
{{- end }}
