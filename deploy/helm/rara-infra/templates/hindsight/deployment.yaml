{{- if .Values.hindsight.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rara-infra.fullname" . }}-hindsight-pg
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rara-infra.componentLabels" (dict "root" . "component" "hindsight-pg") | nindent 4 }}
spec:
  replicas: true
  selector:
    matchLabels:
      {{- include "rara-infra.componentSelectorLabels" (dict "root" . "component" "hindsight-pg") | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "rara-infra.componentLabels" (dict "root" . "component" "hindsight-pg") | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.hindsight.postgresql.image.repository }}:{{ .Values.hindsight.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.hindsight.postgresql.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.hindsight.postgresql.auth.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.hindsight.postgresql.auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.hindsight.postgresql.auth.database | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.hindsight.postgresql.auth.user | quote }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.hindsight.postgresql.auth.user | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          {{- with .Values.hindsight.postgresql.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          {{- if .Values.hindsight.postgresql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "rara-infra.fullname" . }}-hindsight-pg
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rara-infra.fullname" . }}-hindsight
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rara-infra.componentLabels" (dict "root" . "component" "hindsight") | nindent 4 }}
spec:
  replicas: true
  selector:
    matchLabels:
      {{- include "rara-infra.componentSelectorLabels" (dict "root" . "component" "hindsight") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rara-infra.componentLabels" (dict "root" . "component" "hindsight") | nindent 8 }}
    spec:
      containers:
        - name: hindsight
          image: "{{ .Values.hindsight.image.repository }}:{{ .Values.hindsight.image.tag }}"
          imagePullPolicy: {{ .Values.hindsight.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
            - name: admin
              containerPort: 9999
              protocol: TCP
          env:
            - name: HINDSIGHT_DB_URL
              # yamllint disable-next-line rule:line-length
              value: "postgresql://{{ .Values.hindsight.postgresql.auth.user }}:{{ .Values.hindsight.postgresql.auth.password }}@{{ include "rara-infra.fullname" . }}-hindsight-pg:5432/{{ .Values.hindsight.postgresql.auth.database }}"
            {{- range $name, $value := .Values.hindsight.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          {{- with .Values.hindsight.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
