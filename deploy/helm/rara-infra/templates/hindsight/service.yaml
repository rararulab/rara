{{- if .Values.hindsight.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rara-infra.fullname" . }}-hindsight-pg
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rara-infra.componentLabels" (dict "root" . "component" "hindsight-pg") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "rara-infra.componentSelectorLabels" (dict "root" . "component" "hindsight-pg") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rara-infra.fullname" . }}-hindsight
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rara-infra.componentLabels" (dict "root" . "component" "hindsight") | nindent 4 }}
spec:
  type: {{ .Values.hindsight.service.type }}
  ports:
    - name: http
      port: {{ .Values.hindsight.service.port }}
      targetPort: http
      protocol: TCP
    - name: admin
      port: {{ .Values.hindsight.service.adminPort }}
      targetPort: admin
      protocol: TCP
  selector:
    {{- include "rara-infra.componentSelectorLabels" (dict "root" . "component" "hindsight") | nindent 4 }}
{{- end }}
