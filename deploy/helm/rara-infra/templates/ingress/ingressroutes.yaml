{{- if .Values.traefik.enabled }}
{{- $fullName := include "rara-infra.fullname" . -}}
{{- $domain := .Values.global.domain -}}
{{- $tlsSecret := printf "%s-wildcard-tls" $fullName -}}
{{- $labels := include "rara-infra.labels" . -}}

# --------------------------------------------------------------------------
# Traefik Dashboard
# --------------------------------------------------------------------------
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}-traefik-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.{{ $domain }}`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: {{ $tlsSecret }}

