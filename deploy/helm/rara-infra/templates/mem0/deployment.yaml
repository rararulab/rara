{{- if .Values.mem0.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rara-infra.fullname" . }}-mem0
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rara-infra.componentLabels" (dict "root" . "component" "mem0") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "rara-infra.componentSelectorLabels" (dict "root" . "component" "mem0") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rara-infra.componentLabels" (dict "root" . "component" "mem0") | nindent 8 }}
    spec:
      containers:
        - name: mem0
          image: "{{ .Values.mem0.image.repository }}:{{ .Values.mem0.image.tag }}"
          imagePullPolicy: {{ .Values.mem0.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              pip install --quiet --no-cache-dir chromadb ollama &&
              python3 /app/patch_config.py &&
              exec uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
          workingDir: /app
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: CHROMA_HOST
              value: "{{ include "rara-infra.fullname" . }}-chromadb"
            - name: CHROMA_PORT
              value: {{ .Values.chromadb.service.port | default "8000" | quote }}
            - name: HISTORY_DB_PATH
              value: "/tmp/mem0_history.db"
            {{- range $name, $value := .Values.mem0.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          {{- with .Values.mem0.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: patch-script
              mountPath: /app/patch_config.py
              subPath: patch_config.py
              readOnly: true
      volumes:
        - name: patch-script
          configMap:
            name: {{ include "rara-infra.fullname" . }}-mem0-config
{{- end }}
