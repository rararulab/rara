{{- if index .Values "cert-manager" "enabled" }}
---
# Self-signed issuer used to create the root CA certificate
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "rara-infra.fullname" . }}-selfsigned
  labels:
    {{- include "rara-infra.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
spec:
  selfSigned: {}
---
# Root CA certificate signed by the self-signed issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "rara-infra.fullname" . }}-ca
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rara-infra.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
spec:
  isCA: true
  commonName: "{{ .Values.global.domain }} CA"
  secretName: {{ include "rara-infra.fullname" . }}-ca-tls
  duration: 87600h # 10 years
  renewBefore: 8760h # 1 year
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ include "rara-infra.fullname" . }}-selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
# CA issuer that uses the root CA certificate to sign other certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "rara-infra.fullname" . }}-ca-issuer
  labels:
    {{- include "rara-infra.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
spec:
  ca:
    secretName: {{ include "rara-infra.fullname" . }}-ca-tls
{{- end }}
