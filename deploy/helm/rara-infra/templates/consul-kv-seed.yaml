{{- if .Values.consul.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rara-infra.fullname" . }}-consul-kv-seed
  labels:
    {{- include "rara-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: consul-kv-seed
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "rara-infra.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: consul-kv-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: consul-kv-seed
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -ec
            - |
              CONSUL_ADDR="http://{{ .Values.consul.global.name | default "consul" }}-server:8500"

              # Wait for Consul to be ready (up to 120s)
              echo "Waiting for Consul at ${CONSUL_ADDR} ..."
              attempts=0
              until curl -sf "${CONSUL_ADDR}/v1/status/leader" > /dev/null 2>&1; do
                attempts=$((attempts + 1))
                if [ "$attempts" -ge 60 ]; then
                  echo "ERROR: Consul not ready after 120s"
                  exit true
                fi
                sleep 2
              done
              echo "Consul is ready."

              put_kv() {
                local key="$1"
                local value="$2"
                echo "Setting ${key}"
                curl -sf -X PUT -d "${value}" "${CONSUL_ADDR}/v1/kv/${key}" > /dev/null
              }

              echo "Seeding Consul KV at ${CONSUL_ADDR} ..."

              {{- $domain := .Values.global.domain | default "rara.local" }}
              {{- $ov := .Values.consulSeed.overrides }}

              # Database
              put_kv "rara/config/database/database_url" \
                "{{ $ov.databaseUrl | default (printf "postgres://postgres:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.postgresPassword .Release.Name .Values.postgresql.auth.database) }}"

              # Object store (MinIO)
              put_kv "rara/config/object_store/endpoint" \
                "{{ $ov.objectStoreEndpoint | default (printf "http://%s-minio:9000" .Release.Name) }}"
              put_kv "rara/config/object_store/access_key_id" \
                "{{ .Values.minio.rootUser }}"
              put_kv "rara/config/object_store/secret_access_key" \
                "{{ .Values.minio.rootPassword }}"
              put_kv "rara/config/object_store/bucket" \
                "rara"

              # Memory (ChromaDB)
              put_kv "rara/config/memory/chroma_url" \
                "{{ $ov.chromaUrl | default (printf "http://%s-chromadb:8000" .Release.Name) }}"

              {{- if or .Values.mem0.enabled $ov.mem0BaseUrl }}
              # Memory (Mem0 REST API)
              put_kv "rara/config/memory/mem0_base_url" \
                "{{ $ov.mem0BaseUrl | default (printf "http://%s-mem0:8000" .Release.Name) }}"
              {{- end }}

              {{- if or .Values.memos.enabled $ov.memosBaseUrl }}
              # Memory (Memos note service)
              put_kv "rara/config/memory/memos_base_url" \
                "{{ $ov.memosBaseUrl | default (printf "http://%s-memos:5230" .Release.Name) }}"
              put_kv "rara/config/memory/memos_token" \
                "{{ $ov.memosToken }}"
              {{- end }}

              {{- if or .Values.hindsight.enabled $ov.hindsightBaseUrl }}
              # Memory (Hindsight 4-network service)
              put_kv "rara/config/memory/hindsight_base_url" \
                "{{ $ov.hindsightBaseUrl | default (printf "http://%s-hindsight:8888" .Release.Name) }}"
              put_kv "rara/config/memory/hindsight_bank_id" \
                "{{ $ov.hindsightBankId | default "default" }}"
              {{- end }}

              # Crawl4AI
              put_kv "rara/config/crawl4ai/base_url" \
                "{{ $ov.crawl4aiBaseUrl | default (printf "http://%s-crawl4ai:11235" .Release.Name) }}"

              # Telemetry / OTLP (Alloy collector → Tempo)
              put_kv "rara/config/telemetry/otlp_endpoint" \
                "{{ $ov.telemetryOtlpEndpoint | default (printf "http://%s-alloy:4318/v1/traces" .Release.Name) }}"

              # Langfuse (LLM observability)
              put_kv "rara/config/langfuse/host" \
                "{{ $ov.langfuseHost | default (printf "http://%s-langfuse-web:3000" .Release.Name) }}"
              {{- with .Values.consulSeed.langfuse.publicKey }}
              put_kv "rara/config/langfuse/public_key" "{{ . }}"
              {{- end }}
              {{- with .Values.consulSeed.langfuse.secretKey }}
              put_kv "rara/config/langfuse/secret_key" "{{ . }}"
              {{- end }}

              echo "Consul KV seed complete."
{{- end }}
