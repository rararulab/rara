# rara-infra — Umbrella chart values
# Each component can be toggled with `enabled: true/false`
#
# NOTE: Helm template expressions ({{ .Release.Name }}) cannot be used in
# values.yaml. Service references use the default release name "rara-infra".
# If you install with a different release name, update the service hostnames
# accordingly.

global:
  domain: rara.local
  # Allow custom (non-Bitnami) container images for PostgreSQL
  security:
    allowInsecureImages: true

nameOverride: ""
fullnameOverride: ""

# ------------------------------------------------------------------------------
# Traefik — Ingress controller
# ------------------------------------------------------------------------------
traefik:
  enabled: true
  gateway:
    enabled: false  # We use IngressRoute CRDs, not Gateway API
  ingressRoute:
    dashboard:
      enabled: false  # We manage IngressRoutes ourselves
  ports:
    web:
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
  additionalArguments:
    - "--serversTransport.insecureSkipVerify=true"

# ------------------------------------------------------------------------------
# cert-manager — TLS certificate management
# ------------------------------------------------------------------------------
cert-manager:
  enabled: true
  crds:
    enabled: true
    keep: true
  prometheus:
    enabled: true

# ------------------------------------------------------------------------------
# kube-prometheus-stack — Prometheus + Grafana + AlertManager
# ------------------------------------------------------------------------------
kube-prometheus-stack:
  enabled: true
  grafana:
    enabled: true
    adminUser: admin
    adminPassword: admin
    grafana.ini:
      auth.anonymous:
        enabled: true
        org_role: Admin
      auth:
        disable_login_form: true
    initChownData:
      enabled: false
    persistence:
      enabled: true
      size: 2Gi
    sidecar:
      datasources:
        enabled: true
    additionalDataSources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://rara-infra-tempo:3100
        jsonData:
          tracesToLogsV2:
            datasourceUid: quickwit
          nodeGraph:
            enabled: true
      - name: Quickwit
        type: quickwit-quickwit-datasource
        access: proxy
        url: http://rara-infra-quickwit-searcher:7280/api/v1
  prometheus:
    prometheusSpec:
      enableRemoteWriteReceiver: true
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
  alertmanager:
    enabled: true
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi

# ------------------------------------------------------------------------------
# Tempo — Distributed tracing backend (single binary mode)
# ------------------------------------------------------------------------------
tempo:
  enabled: true
  tempo:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
  persistence:
    enabled: true
    size: 5Gi

# ------------------------------------------------------------------------------
# Alloy — OpenTelemetry collector
# ------------------------------------------------------------------------------
alloy:
  enabled: true
  alloy:
    configMap:
      content: |
        // OTLP receiver for traces, metrics, and logs
        otelcol.receiver.otlp "default" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }
          http {
            endpoint = "0.0.0.0:4318"
          }
          output {
            traces  = [otelcol.exporter.otlp.tempo.input]
            metrics = [otelcol.exporter.prometheus.default.input]
            logs    = [otelcol.exporter.otlphttp.quickwit.input]
          }
        }

        // Export traces to Tempo
        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "rara-infra-tempo:4317"
            tls {
              insecure = true
            }
          }
        }

        // Export metrics to Prometheus remote write
        otelcol.exporter.prometheus "default" {
          forward_to = [prometheus.remote_write.default.receiver]
        }

        prometheus.remote_write "default" {
          endpoint {
            url = "http://rara-infra-kube-prometheus-prometheus:9090/api/v1/write"
          }
        }

        // Export logs to Quickwit via OTLP HTTP
        otelcol.exporter.otlphttp "quickwit" {
          client {
            endpoint = "http://rara-infra-quickwit-indexer:7281"
          }
        }

# ------------------------------------------------------------------------------
# Quickwit — Log search engine (single node)
# ------------------------------------------------------------------------------
quickwit:
  enabled: true
  config:
    default_index_root_uri: s3://quickwit/indexes
    storage:
      s3:
        endpoint: http://rara-infra-minio:9000
        access_key_id: minioadmin
        secret_access_key: minioadmin
        force_path_style_access: true
        region: us-east-1
  searcher:
    replicaCount: 1
  indexer:
    replicaCount: 1
  metastore:
    replicaCount: 1
  control_plane:
    replicaCount: 1
  janitor:
    enabled: true

# ------------------------------------------------------------------------------
# Langfuse — LLM observability platform
# ------------------------------------------------------------------------------
langfuse:
  enabled: true
  langfuse:
    nextauth:
      url: https://langfuse.rara.local
      secret:
        value: "rara-langfuse-nextauth-secret-change-me"
    salt:
      value: "rara-langfuse-salt-change-me"
    features:
      telemetryEnabled: false
  # Deploy Langfuse's own PostgreSQL instance (independent from rara's PG)
  postgresql:
    deploy: true
    # Disambiguate from the top-level PostgreSQL subchart:
    # - fullnameOverride: changes resource names (Service, StatefulSet)
    # - nameOverride: changes app.kubernetes.io/name label (fixes selector overlap)
    fullnameOverride: rara-infra-langfuse-pg
    nameOverride: langfuse-pg
    host: rara-infra-langfuse-pg
    auth:
      password: langfuse
  # Deploy ClickHouse and Redis as Langfuse subcharts
  clickhouse:
    deploy: true
    host: rara-infra-clickhouse
    auth:
      password: clickhouse
    persistence:
      enabled: true
      size: 10Gi
  redis:
    deploy: true
    host: rara-infra-redis-primary
    auth:
      enabled: false
    master:
      persistence:
        enabled: true
        size: 1Gi
  # Use the shared MinIO instance for S3 storage
  s3:
    deploy: false
    bucket: langfuse
    region: us-east-1
    endpoint: "http://rara-infra-minio:9000"
    forcePathStyle: true
    accessKeyId:
      value: minioadmin
    secretAccessKey:
      value: minioadmin
    eventUpload:
      bucket: langfuse
    batchExport:
      bucket: langfuse
    mediaUpload:
      bucket: langfuse

# ------------------------------------------------------------------------------
# Consul — Configuration center (KV store)
# ------------------------------------------------------------------------------
consul:
  enabled: true
  global:
    name: consul
    datacenter: rara-dc1
  server:
    replicas: 1
    storage: 5Gi
    storageClass: null
  client:
    enabled: true
  ui:
    enabled: true
  connectInject:
    enabled: false  # We don't need service mesh, just KV config

# ------------------------------------------------------------------------------
# Consul KV seed — injected by the consul-kv-seed Job (post-install/upgrade).
#
# By default URLs use cluster-internal service DNS. If the rara app runs
# OUTSIDE the cluster, override these to use the Traefik-exposed URLs:
#   consulSeed.overrides.langfuseHost: "https://langfuse.rara.local"
#   consulSeed.overrides.crawl4aiBaseUrl: "https://crawl4ai.rara.local"
#   consulSeed.overrides.mem0BaseUrl: "https://mem0.rara.local"
#   consulSeed.overrides.memosBaseUrl: "https://memos.rara.local"
#   consulSeed.overrides.hindsightBaseUrl: "https://hindsight.rara.local"
#   ... etc.
# ------------------------------------------------------------------------------
consulSeed:
  # Override any auto-derived service URL.
  # Empty string = use internal K8s service DNS (default).
  overrides:
    databaseUrl: ""
    objectStoreEndpoint: ""
    chromaUrl: ""
    mem0BaseUrl: ""
    memosBaseUrl: ""
    memosToken: ""
    hindsightBaseUrl: ""
    hindsightBankId: ""
    crawl4aiBaseUrl: ""
    telemetryOtlpEndpoint: ""
    langfuseHost: ""
  langfuse:
    # Create a project in Langfuse UI, then paste the API keys here.
    publicKey: ""
    secretKey: ""

# ------------------------------------------------------------------------------
# MinIO — Object storage
# ------------------------------------------------------------------------------
minio:
  enabled: true
  mode: standalone
  rootUser: minioadmin
  rootPassword: minioadmin
  consoleService:
    type: ClusterIP
    port: 9001
  service:
    type: ClusterIP
    port: 9000
  buckets:
    - name: rara
      policy: none
      purge: false
    - name: langfuse
      policy: none
      purge: false
    - name: quickwit
      policy: none
      purge: false
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

# ------------------------------------------------------------------------------
# PostgreSQL — Primary database (with pgmq extension)
# ------------------------------------------------------------------------------
postgresql:
  enabled: true
  image:
    registry: ghcr.io
    repository: pgmq/pg18-pgmq
    tag: "v1.10.0"
  auth:
    postgresPassword: postgres
    database: rara
    usePasswordFiles: false
  volumePermissions:
    enabled: true
  primary:
    # pgmq image runs as UID 999 (standard postgres), not Bitnami's UID 1001
    podSecurityContext:
      enabled: true
      fsGroup: 999
    containerSecurityContext:
      enabled: true
      runAsUser: 999
      runAsGroup: 999
      readOnlyRootFilesystem: false
    persistence:
      enabled: true
      # Bitnami default is 8Gi — do NOT change after initial install
      # (StatefulSet VolumeClaimTemplates are immutable)
    resources:
      requests:
        cpu: 250m
        memory: 512Mi

# ------------------------------------------------------------------------------
# ChromaDB — Vector database (custom template)
# ------------------------------------------------------------------------------
chromadb:
  enabled: true
  image:
    repository: chromadb/chroma
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ------------------------------------------------------------------------------
# Crawl4AI — Web crawling service (custom template)
# ------------------------------------------------------------------------------
crawl4ai:
  enabled: true
  image:
    repository: unclecode/crawl4ai
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 11235
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

# ------------------------------------------------------------------------------
# Mem0 REST API — self-hosted memory API (custom template)
# ------------------------------------------------------------------------------
mem0:
  enabled: false
  image:
    repository: mem0/mem0-api-server
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  env:
    # Set when enabling mem0 (or provide equivalent provider-specific vars).
    OPENAI_API_KEY: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ------------------------------------------------------------------------------
# Memos — Markdown note service (custom template)
# ------------------------------------------------------------------------------
memos:
  enabled: false
  image:
    repository: neosmemo/memos
    tag: "stable"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5230
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  postgresql:
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    auth:
      user: memos
      password: memos
      database: memos
    persistence:
      enabled: true
      size: 2Gi
      storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ------------------------------------------------------------------------------
# Hindsight — 4-network memory service (custom template)
# ------------------------------------------------------------------------------
hindsight:
  enabled: false
  image:
    repository: ghcr.io/vectorize-io/hindsight
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8888
    adminPort: 9999
  env: {}
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  postgresql:
    image:
      repository: pgvector/pgvector
      tag: "pg16"
      pullPolicy: IfNotPresent
    auth:
      user: hindsight
      password: hindsight
      database: hindsight
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
