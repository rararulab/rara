{{- if .Values.ingress.enabled }}
{{- $fullName := include "rara-app.fullname" . -}}
{{- $domain := .Values.global.domain -}}
{{- $tlsSecret := include "rara-app.tlsSecretName" . -}}
{{- $labels := include "rara-app.labels" . -}}

# --------------------------------------------------------------------------
# Frontend — app.{{ $domain }}
# --------------------------------------------------------------------------
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`app.{{ $domain }}`)
      kind: Rule
      services:
        - name: {{ $fullName }}-frontend
          port: {{ .Values.frontend.service.port }}
  tls:
    secretName: {{ $tlsSecret }}
---
# --------------------------------------------------------------------------
# Backend API — api.{{ $domain }}
# --------------------------------------------------------------------------
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`api.{{ $domain }}`)
      kind: Rule
      services:
        - name: {{ $fullName }}-backend
          port: {{ .Values.backend.service.httpPort }}
  tls:
    secretName: {{ $tlsSecret }}
{{- end }}
