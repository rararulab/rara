apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rara-app.fullname" . }}-consul-kv-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rara-app.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "rara-app.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: consul-kv-seed
          image: curlimages/curl:latest
          env:
            - name: CONSUL_ADDR
              value: {{ .Values.consul.address | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "rara-app.fullname" . }}
                  key: jwt-secret
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for Consul at ${CONSUL_ADDR}..."
              until curl -sf "${CONSUL_ADDR}/v1/status/leader" > /dev/null 2>&1; do
                echo "  Consul not ready, retrying in 3s..."
                sleep 3
              done
              echo "Consul is ready."

              echo "Setting rara/config/jwt_secret..."
              curl -sf -X PUT -d "${JWT_SECRET}" "${CONSUL_ADDR}/v1/kv/rara/config/jwt_secret" > /dev/null
              echo "Consul KV seed complete."
