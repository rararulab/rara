apiVersion: v1
kind: Service
metadata:
  name: {{ include "rara-app.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rara-app.componentLabels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "rara-app.componentSelectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
