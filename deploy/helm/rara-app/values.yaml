global:
  domain: rara.local

nameOverride: ""
fullnameOverride: ""

infra:
  releaseName: rara-infra

consul:
  address: "http://consul-server:8500"

secret:
  jwtSecret: "change-me-in-production"

backend:
  replicas: 1
  image:
    repository: ghcr.io/crrow/job
    tag: ""
    pullPolicy: Always
  service:
    httpPort: 25555
    grpcPort: 50051
  rustLog: "info,rara=debug"
  extraEnv: []
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

frontend:
  replicas: 1
  image:
    repository: ghcr.io/crrow/job-web
    tag: ""
    pullPolicy: Always
  service:
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

ingress:
  enabled: true
  tlsSecretName: ""

metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}
