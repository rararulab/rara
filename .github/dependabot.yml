version: 2
updates:
  # Maintain dependencies for Cargo
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10

  # Maintain dependencies for GitHub Actions (workflows)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10

  # Maintain dependencies for GitHub Actions (composite actions)
  - package-ecosystem: github-actions
    directory: "/.github/actions/setup-rust"
    schedule:
      interval: daily
    open-pull-requests-limit: 5