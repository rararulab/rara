name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `rara server`
        2. Send request to ...
        3. Observe error ...

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Relevant log output or error messages
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `rara --version`
      placeholder: "rara 0.0.17"
