name: Refactor
description: Propose a code refactor or technical improvement
labels: ["refactor"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs refactoring and why?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - kernel (core runtime, heartbeat, event bus)
        - memory (tape, session, context)
        - llm (LLM integration, providers)
        - tools (tool system, built-in tools)
        - web (frontend, UI)
        - api (HTTP API, routes)
        - cli (command-line interface)
        - extensions (skills, plugins)
        - ci (CI/CD, build, release)
        - other
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: How would you approach this refactor?
