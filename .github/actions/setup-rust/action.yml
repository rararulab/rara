name: Setup Rust
description: Install Rust toolchain, protoc, and configure caching

inputs:
  toolchain:
    description: "Rust toolchain version (default: read from rust-toolchain.toml)"
    required: false
    default: ""
  components:
    description: "Additional Rust components to install (comma-separated)"
    required: false
    default: ""
  shared-key:
    description: "Shared cache key for rust-cache"
    required: true

runs:
  using: composite
  steps:
    - name: Determine Rust version
      id: rust-version
      shell: bash
      run: |
        if [ -n "${{ inputs.toolchain }}" ]; then
          echo "version=${{ inputs.toolchain }}" >> $GITHUB_OUTPUT
        else
          RUST_VERSION=$(grep 'channel = ' rust-toolchain.toml | cut -d '"' -f 2)
          echo "version=$RUST_VERSION" >> $GITHUB_OUTPUT
        fi

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
      with:
        toolchain: ${{ steps.rust-version.outputs.version }}
        components: ${{ inputs.components }}

    - name: Install protoc
      uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
      with:
        version: "25.x"
        repo-token: ${{ github.token }}

    - name: Rust cache
      uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      with:
        shared-key: ${{ inputs.shared-key }}
        save-if: ${{ github.ref == 'refs/heads/main' }}
