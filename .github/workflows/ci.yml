name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: arc-runner-set
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'api/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'

  lint:
    name: Lint
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'push' }}
    uses: ./.github/workflows/lint.yml

  rust:
    name: Rust
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'push' }}
    uses: ./.github/workflows/rust.yml

  release-pr:
    name: Release PR
    needs: [lint, rust]
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.lint.result == 'success' || needs.lint.result == 'skipped') && (needs.rust.result == 'success' || needs.rust.result == 'skipped') }}
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/release-pr.yml
