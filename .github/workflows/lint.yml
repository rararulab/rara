name: Lint

on:
  workflow_call:

concurrency:
  group: lint-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  rust-format:
    name: Rust Format
    runs-on: arc-runner-set
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          persist-credentials: false

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  proto-lint:
    name: Protocol Buffer Lint
    runs-on: arc-runner-set
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          persist-credentials: false

      - name: Buf lint
        run: cd api && buf lint

      - name: Buf format check
        run: cd api && buf format --diff --exit-code

  lint-success:
    name: Lint Success
    runs-on: arc-runner-set
    needs: [rust-format, proto-lint]
    if: always()
    steps:
      - name: Check all lint jobs status
        env:
          RUST_FORMAT_RESULT: ${{ needs.rust-format.result }}
          PROTO_LINT_RESULT: ${{ needs.proto-lint.result }}
        run: |
          if [[ "$RUST_FORMAT_RESULT" != "success" || \
                "$PROTO_LINT_RESULT" != "success" ]]; then
            echo "One or more lint jobs failed"
            exit 1
          fi
          echo "All lint jobs passed successfully"
