name: Quality Matrix

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "scripts/internal/quality/**"

permissions:
  contents: write

jobs:
  update:
    name: Update Quality Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: scripts/go.mod
          cache-dependency-path: scripts/go.sum

      - name: Build devtool
        run: cd scripts && go build -o bin/devtool ./cmd/devtool/

      - name: Generate quality matrix
        run: scripts/bin/devtool quality-matrix --output docs/src/quality-matrix.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/src/quality-matrix.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update quality matrix"
            git push
          else
            echo "No changes to quality matrix."
          fi
