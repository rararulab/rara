[book]
title = "Rara"
authors = ["crrow"]
description = "Documentation for Rara — Personal AI assistant platform"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/crrow/job"
edit-url-template = "https://github.com/crrow/job/edit/main/docs/{path}"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
