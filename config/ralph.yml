# Ralph CLI configuration for symphony agent execution.
#
# Symphony spawns `ralph run` in each issue worktree. This file controls
# ralph's behavior: which LLM backend to use, iteration limits, and
# post-iteration hooks (e.g. cargo check).
#
# Referenced via symphony config: agent.config_file: "config/ralph.yml"
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/guide/configuration/

backend:
  name: claude

event_loop:
  max_iterations: 20
  prompt_file: PROMPT.md

hooks:
  enabled: true
  events:
    post.iteration:
      - name: cargo-check
        command: ["cargo", "check", "--workspace"]
        timeout_seconds: 120
        on_error: retry

features:
  auto_merge: false
