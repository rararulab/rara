repos:
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check
        entry: cargo check --all --all-targets
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo +nightly fmt --all -- --check
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --all-features --no-deps -- -D warnings
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: check-agent-md
        name: check AGENT.md presence
        entry: scripts/bin/devtool check-agent-md
        language: system
        pass_filenames: false
        files: ^crates/

      - id: conventional-commit
        name: conventional commit message
        entry: scripts/check-conventional-commit.sh
        language: script
        stages: [commit-msg]
        always_run: true
