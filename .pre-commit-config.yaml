repos:
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check
        entry: cargo check --all --all-targets
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo +nightly fmt --all -- --check
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --all-features --no-deps -- -D warnings
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: cargo-doc
        name: cargo doc
        entry: env RUSTDOCFLAGS="-D warnings" cargo +nightly doc --workspace --no-deps --document-private-items
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: check-agent-md
        name: check AGENT.md presence
        entry: go run ./scripts/cmd/devtool/ check-agent-md
        language: system
        pass_filenames: false
        files: ^crates/

      - id: web-lint-staged
        name: web lint-staged
        entry: bash -c 'cd web && npx lint-staged'
        language: system
        files: ^web/.*\.(ts|tsx|css|json|md)$
        pass_filenames: false

      - id: conventional-commit
        name: conventional commit message
        entry: scripts/check-conventional-commit.sh
        language: script
        stages: [commit-msg]
        always_run: true
