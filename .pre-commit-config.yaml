repos:
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check
        entry: cargo check --all --all-targets
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo +nightly fmt --all -- --check
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --all-features --no-deps -- -D warnings
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: cargo-doc
        name: cargo doc
        entry: env RUSTDOCFLAGS="-D warnings" cargo +nightly doc --workspace --no-deps --document-private-items
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: quality-matrix
        name: quality matrix
        entry: bash -c 'go run ./scripts/cmd/devtool/ quality-matrix --output docs/src/quality-matrix.md && git diff --quiet docs/src/quality-matrix.md || { echo "quality-matrix.md updated — please git add and re-commit"; exit 1; }'
        language: system
        pass_filenames: false
        files: ^(crates/|scripts/internal/quality/)

      - id: check-agent-md
        name: check AGENT.md presence
        entry: go run ./scripts/cmd/devtool/ check-agent-md
        language: system
        pass_filenames: false
        files: ^crates/

      - id: conventional-commit
        name: conventional commit message
        entry: scripts/check-conventional-commit.sh
        language: script
        stages: [commit-msg]
        always_run: true
