[workspace.package]
version = "0.0.17"
edition = "2024"
license = "Apache-2.0"
authors = ["crrow"]
repository = "https://github.com/crrow/job"
homepage = "https://github.com/crrow/job"
readme = "README.md"
keywords = ["rust", "axum", "backend", "jobs", "automation"]
categories = ["web-programming"]

[workspace.lints.rust]
unsafe_code = "deny"
rust_2024_compatibility = { level = "warn", priority = -1 }

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }

multiple_crate_versions = "allow"
doc_markdown = "allow"
items_after_statements = "allow"
redundant_pub_crate = "allow"
significant_drop_tightening = "allow"
future_not_send = "allow"
missing_errors_doc = "allow"

[workspace]
resolver = "3"
members = [
    "api",
    "crates/app",
    "crates/cmd",
    "crates/common/base",
    "crates/common/error",
    "crates/common/runtime",
    "crates/common/telemetry",
    "crates/common/utils/downloader",
    "crates/common/object-store",
    "crates/common/worker",
    "crates/common/yunara-store",
    "crates/job-model",
    "crates/domain/shared",
    "crates/domain/job-discovery",
    "crates/ai",
    "crates/domain/resume",
    "crates/domain/application",
    "crates/domain/interview",
    "crates/domain/scheduler",
    "crates/domain/analytics",
    "crates/domain/job-tracker",
    "crates/server",
    "crates/telegram-bot",
    "crates/paths",
    "crates/jobspy-sys",
    "crates/workers",
]

[workspace.dependencies]
async-trait = "^0.1"
axum = "^0.8"
axum-tracing-opentelemetry = "0.33.0"
backon = "^1.3"
bon = "^3.6"
bytes = "^1.11"
config = { version = "0.15", features = ["toml"] }
chrono = { version = "^0.4", features = ["serde"] }
derive_more = { version = "2.0", features = ["full"] }
dirs = "^6"
futures = "^0.3"
http = "^1"
jiff = { version = "^0.2", features = ["serde"] }
lazy_static = "^1.4"
moka = { version = "0.12", features = ["future"] }
once_cell = "^1.20"
opendal = { version = "0.52", features = ["services-s3"] }
prometheus = "^0.14"
prost = "^0.14"
protobuf = "^3.7"
reqwest = "0.12"
rig-core = "0.30"
serde = { version = "^1.0", features = ["derive"] }
serde_json = "1.0.143"
smart-default = "0.7"
snafu = "^0.8"
strum = "^0.27"
strum_macros = "^0.27"
teloxide = { version = "0.14", features = ["macros"] }
tokio = { version = "^1.45", features = ["full", "tracing"] }
tokio-util = "^0.7"
tonic = "^0.14"
tonic-build = "^0.14"
tonic-health = "^0.14"
tonic-prost = "0.14"
tonic-prost-build = "0.14"
tonic-reflection = "^0.14"
tonic-tracing-opentelemetry = "0.32.0"
tonic-web = "^0.14"
tower = "^0.5"
tower-http = { version = "^0.6", features = ["cors", "timeout", "trace"] }
tracing = "^0.1"
tracing-subscriber = "^0.3"
uuid = { version = "1", features = ["v4", "serde"] }
validator = "0.20"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "macros", "migrate", "chrono", "uuid"] }

# Testing
testcontainers = "0.26"
testcontainers-modules = { version = "0.14", features = ["postgres"] }

# Internal workspace crates (use =version to keep in sync with workspace version)
job-api = { version = "=0.0.17", path = "api" }
job-app = { version = "=0.0.17", path = "crates/app" }
job-base = { version = "=0.0.17", path = "crates/common/base" }
job-cli = { version = "=0.0.17", path = "crates/cmd" }
job-common-runtime = { version = "=0.0.17", path = "crates/common/runtime" }
job-common-telemetry = { version = "=0.0.17", path = "crates/common/telemetry" }
job-common-worker = { version = "=0.0.17", path = "crates/common/worker" }
job-error = { version = "=0.0.17", path = "crates/common/error" }
job-model = { version = "=0.0.17", path = "crates/job-model" }
job-object-store = { version = "=0.0.17", path = "crates/common/object-store" }
job-server = { version = "=0.0.17", path = "crates/server" }
job-telegram-bot = { version = "=0.0.17", path = "crates/telegram-bot" }
yunara-store = { version = "0.1.0", path = "crates/common/yunara-store" }

# Domain crates
job-ai = { version = "=0.0.17", path = "crates/ai" }
job-domain-analytics = { version = "=0.0.17", path = "crates/domain/analytics" }
job-domain-application = { version = "=0.0.17", path = "crates/domain/application" }
job-domain-interview = { version = "=0.0.17", path = "crates/domain/interview" }
job-domain-job-discovery = { version = "=0.0.17", path = "crates/domain/job-discovery" }
job-domain-resume = { version = "=0.0.17", path = "crates/domain/resume" }
job-domain-job-tracker = { version = "=0.0.17", path = "crates/domain/job-tracker" }
job-domain-scheduler = { version = "=0.0.17", path = "crates/domain/scheduler" }
job-domain-shared = { version = "=0.0.17", path = "crates/domain/shared" }
job-workers = { version = "=0.0.17", path = "crates/workers" }
jobspy-sys = { version = "=0.0.17", path = "crates/jobspy-sys" }

# Config for 'cargo dist'
[workspace.metadata.dist]
# The preferred cargo-dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.19.1"
# CI backends to support
ci = "github"
# Where to host releases
hosting = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-unknown-linux-gnu"]
# The archive format to use for windows builds (defaults .zip)
windows-archive = ".tar.gz"
# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".tar.gz"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Publish jobs to run in CI
pr-run-mode = "plan"
# Whether to install an updater program
install-updater = false
# Use custom release notes generated by git-cliff
release-notes = "RELEASE_NOTES.md"
# Skip checking whether the specified configuration files are up to date
# (we use ubuntu-latest instead of ubuntu-20.04 which cargo-dist wants)
allow-dirty = ["ci"]
# A GitHub repo to push Homebrew formulas to
tap = "crrow/homebrew-tap"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Use appropriate runners for each target
[workspace.metadata.dist.github-custom-runners]
aarch64-apple-darwin = "macos-latest"
x86_64-unknown-linux-gnu = "ubuntu-latest"

# The profile that 'cargo dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
