version: "1"

defaults:
  agent: claude
  provider: local
  trials: 5
  timeout: 300
  threshold: 0.8

tasks:
  - name: route-implementation-to-claude
    instruction: |
      A user asks: "Add a rate limiter middleware to the HTTP server in crates/backend/src/middleware/."
      Using the dev-workflow skill, explain what steps you would take and which agent you would delegate to.
      Write your plan to plan.md.

    workspace: []

    graders:
      - type: deterministic
        run: |
          score=0; total=4; checks="["
          c1=false; c2=false; c3=false; c4=false

          if test -f plan.md; then
            content=$(cat plan.md)

            if echo "$content" | grep -qi "acpx claude"; then
              c1=true; score=$((score + 1))
            fi

            if echo "$content" | grep -qi "issue"; then
              c2=true; score=$((score + 1))
            fi

            if echo "$content" | grep -qi "worktree"; then
              c3=true; score=$((score + 1))
            fi

            if echo "$content" | grep -qi "pr\|pull request"; then
              c4=true; score=$((score + 1))
            fi
          fi

          final=$(awk "BEGIN {printf \"%.2f\", $score/$total}")
          echo "{\"score\":$final,\"details\":\"$score/$total checks passed\",\"checks\":[{\"name\":\"delegates-to-claude\",\"passed\":$c1,\"message\":\"Implementation routed to Claude via acpx\"},{\"name\":\"creates-issue\",\"passed\":$c2,\"message\":\"Plan includes issue creation\"},{\"name\":\"uses-worktree\",\"passed\":$c3,\"message\":\"Plan includes worktree isolation\"},{\"name\":\"creates-pr\",\"passed\":$c4,\"message\":\"Plan includes PR creation\"}]}"
        weight: 0.7

      - type: llm_rubric
        rubric: |
          Workflow Compliance (0-0.5):
          - Does the plan follow the correct sequence: issue → worktree → delegate → verify → PR?
          - Does it route the implementation task to Claude (not Codex)?

          Instruction Quality (0-0.5):
          - Would the delegation instruction to Claude be specific enough to produce working code?
          - Does it include constraints like conventional commits and doc comments?
        weight: 0.3

  - name: route-review-to-codex
    instruction: |
      A user asks: "Review PR #42 for security issues before we merge it."
      Using the dev-workflow skill, explain what steps you would take and which agent you would delegate to.
      Write your plan to plan.md.

    workspace: []

    graders:
      - type: deterministic
        run: |
          score=0; total=3; checks="["
          c1=false; c2=false; c3=false

          if test -f plan.md; then
            content=$(cat plan.md)

            if echo "$content" | grep -qi "acpx codex"; then
              c1=true; score=$((score + 1))
            fi

            if echo "$content" | grep -qi "security"; then
              c2=true; score=$((score + 1))
            fi

            if echo "$content" | grep -qi "review\|structured"; then
              c3=true; score=$((score + 1))
            fi
          fi

          final=$(awk "BEGIN {printf \"%.2f\", $score/$total}")
          echo "{\"score\":$final,\"details\":\"$score/$total checks passed\",\"checks\":[{\"name\":\"delegates-to-codex\",\"passed\":$c1,\"message\":\"Review routed to Codex via acpx\"},{\"name\":\"security-focus\",\"passed\":$c2,\"message\":\"Plan addresses security review\"},{\"name\":\"structured-output\",\"passed\":$c3,\"message\":\"Plan requests structured review output\"}]}"
        weight: 0.7

      - type: llm_rubric
        rubric: |
          Agent Selection (0-0.5):
          - Does the plan correctly route code review to Codex (not Claude)?
          - Is the reasoning for choosing Codex appropriate (analysis, not modification)?

          Review Quality (0-0.5):
          - Does the review instruction ask for severity ratings?
          - Does it request file:line references for findings?
        weight: 0.3

  - name: parallel-independent-tasks
    instruction: |
      A user asks: "We need to fix the auth timeout bug (#100) and add dark mode to the settings page (#101). These are independent."
      Using the dev-workflow skill, explain how you would handle both tasks.
      Write your plan to plan.md.

    workspace: []

    graders:
      - type: deterministic
        run: |
          score=0; total=4
          c1=false; c2=false; c3=false; c4=false

          if test -f plan.md; then
            content=$(cat plan.md)

            if echo "$content" | grep -qi "parallel"; then
              c1=true; score=$((score + 1))
            fi

            worktree_count=$(echo "$content" | grep -ci "worktree")
            if [ "$worktree_count" -ge 2 ]; then
              c2=true; score=$((score + 1))
            fi

            if echo "$content" | grep -qi "\-s \|session"; then
              c3=true; score=$((score + 1))
            fi

            if echo "$content" | grep -qi "acpx claude"; then
              c4=true; score=$((score + 1))
            fi
          fi

          final=$(awk "BEGIN {printf \"%.2f\", $score/$total}")
          echo "{\"score\":$final,\"details\":\"$score/$total checks passed\",\"checks\":[{\"name\":\"parallel-execution\",\"passed\":$c1,\"message\":\"Plan uses parallel execution\"},{\"name\":\"separate-worktrees\",\"passed\":$c2,\"message\":\"Each task gets its own worktree\"},{\"name\":\"named-sessions\",\"passed\":$c3,\"message\":\"Uses named sessions for isolation\"},{\"name\":\"delegates-implementation\",\"passed\":$c4,\"message\":\"Implementation delegated to Claude\"}]}"
        weight: 0.7

      - type: llm_rubric
        rubric: |
          Parallelism (0-0.5):
          - Does the plan create separate worktrees and branches for each task?
          - Does it use named acpx sessions to avoid session conflicts?

          Completeness (0-0.5):
          - Does each task follow the full lifecycle (issue → worktree → delegate → verify → PR)?
          - Are both tasks treated as independent PRs that can merge separately?
        weight: 0.3
